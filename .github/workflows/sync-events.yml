name: Sync Events from Airtable

# Mirrors sync-listings.yml: pulls Approved events, drops stale one-offs,
# writes site/events-data.js, commits and pushes so Vercel redeploys.

on:
  workflow_dispatch:
  # Cron restored 2026-06-01 after the Google freeze: walk-time
  # estimates now use backend/walk.js (free Haversine + Nominatim
  # geocode), so the sync no longer hits any paid API. The previous
  # 7:15 / 19:15 UTC firing rhythm is preserved.
  schedule:
    - cron: '15 7,19 * * *'
  repository_dispatch:
    types: [event-approved]

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Backup existing events-data.js
        run: |
          if [ -f site/events-data.js ]; then
            cp site/events-data.js site/events-data.js.bak
          fi

      - name: Run events sync
        env:
          AIRTABLE_API_KEY: ${{ secrets.AIRTABLE_API_KEY }}
          AIRTABLE_BASE_ID: ${{ secrets.AIRTABLE_BASE_ID }}
          GOOGLE_PLACES_KEY: ${{ secrets.GOOGLE_PLACES_KEY }}
        run: node backend/sync-events.js

      - name: Restore backup on sync failure
        if: failure()
        run: |
          if [ -f site/events-data.js.bak ]; then
            mv site/events-data.js.bak site/events-data.js
            echo "Restored previous events-data.js after sync failure"
          fi

      - name: Clean up backup
        if: always()
        run: rm -f site/events-data.js.bak

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/events-data.js site/images/events
          if ! git diff --cached --quiet; then
            git commit -m "chore: refresh events from Airtable"
            git pull --rebase
            git push
          else
            echo "No event changes to commit."
          fi
